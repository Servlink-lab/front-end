<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Estilos para a tabela */
        table {
            width: 100%;
            margin-top: 10px;
            border: 1px solid black;
            border-collapse: collapse;
        }

        th {
            border: 1px solid black;
            border-collapse: collapse;
            background-color: lightgray;
            padding: 5px;
        }

        td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 5px;
        }
    </style>
</head>

<body>
    <h3>Anotações</h3>
    Nota: <Input type="text" id="nota">
    <button onclick="adicionar();">Adicionar</button>

    <table>
        <thead>
            <th style="width: auto">Notas</th>
            <th style="width: 20%">Ação</th>
        </thead>
        <tbody id="conteudo"></tbody>
    </table>

    <script>
        document.getElementById("nota").focus();

        function adicionar() {
            const nota = document.getElementById("nota");
            if (nota.value.trim() == "") {
                alert("A nota não pode estar vazia");
                nota.focus();
                return;
            }

            const tbody = document.getElementById("conteudo");
            const tr = document.createElement("tr");

            const tdNota = document.createElement("td");
            tdNota.appendChild(document.createTextNode(nota.value));
            tr.appendChild(tdNota);

            const tdBotao = document.createElement("td");
            tdBotao.style.textAlign = "center";
            const button = document.createElement("button");
            button.innerHTML = "X";
            button.addEventListener('click', function (event) {
                const linha = event.target.parentNode.parentNode;
                linha.remove();
            });

            tdBotao.appendChild(button);
            tr.appendChild(tdBotao);
            tbody.appendChild(tr);
            nota.value = "";
            nota.focus();
        }


    </script>
</body>

</html>
